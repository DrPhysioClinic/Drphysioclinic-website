<!DOCTYPE html>
<html>
<head>
<style>
  body { background: red; margin: 0; height: 100vh; overflow: hidden; }
  .overlay {
    position: fixed; inset: 0; background: white;
    clip-path: polygon(
      0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%, 
      calc(50vw - 30px) calc(50vh - 30px),
      calc(50vw - 100px) calc(50vh - 30px),
      calc(50vw - 100px) calc(50vh + 30px),
      calc(50vw - 30px) calc(50vh + 30px),
      calc(50vw - 30px) calc(50vh + 100px),
      calc(50vw + 30px) calc(50vh + 100px),
      calc(50vw + 30px) calc(50vh + 30px),
      calc(50vw + 100px) calc(50vh + 30px),
      calc(50vw + 100px) calc(50vh - 30px),
      calc(50vw + 30px) calc(50vh - 30px),
      calc(50vw + 30px) calc(50vh - 100px),
      calc(50vw - 30px) calc(50vh - 100px),
      calc(50vw - 30px) calc(50vh - 30px)
    );
    transition: clip-path 2s ease-in-out;
  }
  body:hover .overlay {
    clip-path: polygon(
      0% 0%, 100% 0%, 100% 100%, 0% 100%, 0% 0%, 
      calc(50vw - 1500px) calc(50vh - 1500px),
      calc(50vw - 3000px) calc(50vh - 1500px),
      calc(50vw - 3000px) calc(50vh + 1500px),
      calc(50vw - 1500px) calc(50vh + 1500px),
      calc(50vw - 1500px) calc(50vh + 3000px),
      calc(50vw + 1500px) calc(50vh + 3000px),
      calc(50vw + 1500px) calc(50vh + 1500px),
      calc(50vw + 3000px) calc(50vh + 1500px),
      calc(50vw + 3000px) calc(50vh - 1500px),
      calc(50vw + 1500px) calc(50vh - 1500px),
      calc(50vw + 1500px) calc(50vh - 3000px),
      calc(50vw - 1500px) calc(50vh - 3000px),
      calc(50vw - 1500px) calc(50vh - 1500px)
    );
  }
</style>
</head>
<body>
  <div class="overlay"></div>
  <h1 style="position: relative; z-index: -1;">Hover me!</h1>
</body>
</html>
