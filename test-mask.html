<!DOCTYPE html>
<html>
<head>
<style>
  body { background: url('https://placehold.co/800x600') center/cover; margin: 0; height: 100vh; }
  .overlay {
    position: fixed; inset: 0; background: #fff;
    mask: url(#plus-mask);
    -webkit-mask: url(#plus-mask);
  }
</style>
</head>
<body>
  <svg width="0" height="0">
    <mask id="plus-mask">
      <rect width="100%" height="100%" fill="white" />
      <path d="..." fill="black" />
    </mask>
  </svg>
  <div class="overlay"></div>
</body>
</html>
